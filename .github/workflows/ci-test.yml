# =============================================================================
# THIS WORKFLOW IS FOR TESTING PURPOSES ONLY.
# It is used to verify various CI job statuses (success, failure, skipped,
# slow/pending). It is NOT part of any production pipeline.
# =============================================================================

name: CI Status Test

on:
  pull_request:
  workflow_dispatch:

jobs:
  # --- Test: job that always succeeds ---
  always-success:
    name: Always Success
    runs-on: ubuntu-latest
    steps:
      - name: Succeed
        run: echo "This job always succeeds."

  # --- Test: job that always fails (exit 1) ---
  always-failure:
    name: Always Failure
    runs-on: ubuntu-latest
    steps:
      - name: Fail
        run: |
          echo "This job always fails."
          exit 1

  # --- Test: slow job to verify pending/in-progress status ---
  slow-job:
    name: Slow Job (60 seconds)
    runs-on: ubuntu-latest
    steps:
      - name: Sleep for 60 seconds
        run: sleep 60

  # --- Test: job that is always skipped via `if: false` ---
  always-skipped:
    name: Always Skipped
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - name: This step never runs
        run: echo "This job should always be skipped."

# --- Additional test jobs ---

  # --- Test: another successful job ---
  success-2:
    name: Another Success
    runs-on: ubuntu-latest
    steps:
      - name: Echo success
        run: echo "This job also succeeds."

  # --- Test: yet another successful job ---
  success-3:
    name: Yet Another Success
    runs-on: ubuntu-latest
    steps:
      - name: Print something
        run: |
          echo "Hello from yet another success job!"
          echo "All good here."

  # --- Test: another failing job (exit 1) ---
  failure-2:
    name: Another Failure
    runs-on: ubuntu-latest
    steps:
      - name: Fail with error
        run: |
          echo "Going to fail now..."
          exit 1

  # --- Test: failure caused by a non-existent command ---
  failure-3:
    name: Failure with bad command
    runs-on: ubuntu-latest
    steps:
      - name: Run non-existent command
        run: some-non-existent-command

  # --- Test: long-running job to observe pending/in-progress behavior ---
  long-running-slow:
    name: Very Slow Job (120 seconds)
    runs-on: ubuntu-latest
    steps:
      - name: Sleep for 120 seconds
        run: sleep 120

  # --- Test: extra-long-running job (5 minutes) ---
  extra-long-running:
    name: Extra Long Job (300 seconds)
    runs-on: ubuntu-latest
    steps:
      - name: Sleep for 300 seconds
        run: sleep 300

  # --- Test: skipped via an impossible event condition ---
  skipped-by-condition:
    name: Skipped by Condition
    if: ${{ github.event_name == 'nonexistent_event' }}
    runs-on: ubuntu-latest
    steps:
      - name: Never runs
        run: echo "This should never run."

  # --- Test: skipped via a false expression ---
  skipped-by-false-expression:
    name: Skipped by False Expression
    if: ${{ contains('hello', 'xyz') }}
    runs-on: ubuntu-latest
    steps:
      - name: Never runs either
        run: echo "Skipped due to false condition."

  # --- Test: very long sleep to test pending status (10 minutes) ---
  pending-long-sleep:
    name: Pending Long Sleep (600 seconds)
    runs-on: ubuntu-latest
    steps:
      - name: Sleep for 600 seconds
        run: sleep 600

  # --- Test: medium-length sleep job ---
  medium-slow:
    name: Medium Slow Job (30 seconds)
    runs-on: ubuntu-latest
    steps:
      - name: Sleep for 30 seconds
        run: sleep 30
